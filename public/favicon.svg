<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="KanoLens">
  <defs>
    <radialGradient id="copper" cx="36%" cy="30%" r="78%">
      <stop offset="0%" stop-color="hsl(20,78%,66%)" />
      <stop offset="44%" stop-color="hsl(15,58%,47%)" />
      <stop offset="100%" stop-color="hsl(14,60%,35%)" />
    </radialGradient>
    <radialGradient id="spec" cx="30%" cy="30%" r="38%">
      <stop offset="0%" stop-color="hsl(40,60%,98%)" stop-opacity="0.92" />
      <stop offset="70%" stop-color="hsl(40,60%,98%)" stop-opacity="0" />
    </radialGradient>
  </defs>
  <!-- subtle outer ring, matching the in-app medallion -->
  <circle cx="16" cy="16" r="15" fill="hsl(15,42%,40%)" opacity="0.22" />
  <!-- copper sphere -->
  <circle cx="16" cy="16" r="13.3" fill="url(#copper)" />
  <!-- glossy specular highlight, upper-left -->
  <ellipse cx="11.6" cy="11" rx="5" ry="4" fill="url(#spec)" />
</svg>
